version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: opinapp-db
    environment:
      POSTGRES_USER: ${DB_USER:-opinapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-senha123}
      POSTGRES_DB: ${DB_NAME:-opinapp_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-opinapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opinapp-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-opinapp}:${DB_PASSWORD:-senha123}@postgres:5432/${DB_NAME:-opinapp_db}
      JWT_SECRET: ${JWT_SECRET:-seu-secret-super-seguro-aqui}
      PORT: 4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  # Frontend (opcional)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: opinapp-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  default:
    name: opinapp-network