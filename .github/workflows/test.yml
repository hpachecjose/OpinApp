name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opinapp
          POSTGRES_PASSWORD: senha123
          POSTGRES_DB: opinapp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Setup Prisma
        run: |
          npx prisma generate
          npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://opinapp:senha123@localhost:5432/opinapp_test

      - name: Run tests
        run: npm test -- --coverage
        working-directory: backend

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/coverage-final.json